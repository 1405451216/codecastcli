# GoReleaser 配置 — CodecastCLI v0.4.0
# 文档: https://goreleaser.com/customization/

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: codecast
    main: .
    binary: codecast
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X codecast/cli/internal/version.Version={{.Version}}
      - -X codecast/cli/internal/version.GitCommit={{.ShortCommit}}
      - -X codecast/cli/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*
      - CHANGELOG.md
      - completions/*

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

# Homebrew Tap (macOS/Linux)
homebrew_casks:
  - name: codecast
    repository:
      owner: codecast
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/codecast/codecastcli"
    description: "AI-powered terminal coding assistant"
    install: |
      binary "codecast"
    uninstall: |
      delete "#{usr_bin}/codecast"

# Scoop Bucket (Windows)
scoops:
  - name: codecast
    repository:
      owner: codecast
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    homepage: "https://github.com/codecast/codecastcli"
    description: "AI-powered terminal coding assistant"
    license: MIT

# NFPM (DEB/RPM for Linux)
nfpms:
  - id: codecast
    package_name: codecast
    vendor: Codecast
    homepage: "https://github.com/codecast/codecastcli"
    maintainer: "Codecast Team <noreply@codecast.dev>"
    description: "AI-powered terminal coding assistant"
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: ./completions/codecast.bash
        dst: /etc/bash_completion.d/codecast
      - src: ./completions/codecast.zsh
        dst: /usr/share/zsh/site-functions/_codecast
      - src: ./completions/codecast.fish
        dst: /usr/share/fish/vendor_completions.d/codecast.fish

# GitHub Release
release:
  github:
    owner: codecast
    name: codecastcli
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## CodecastCLI v{{ .Version }}

    详见 [CHANGELOG.md](CHANGELOG.md)
  footer: |
    ---
    ### 安装

    **go install**
    ```bash
    go install github.com/codecast/codecastcli@v{{ .Version }}
    ```

    **Homebrew (macOS/Linux)**
    ```bash
    brew install --cask codecast/codecast/codecast
    ```

    **Scoop (Windows)**
    ```bash
    scoop bucket add codecast https://github.com/codecast/scoop-bucket
    scoop install codecast
    ```

    **Linux DEB/RPM**
    从下方 Assets 下载对应包安装。

snapshot:
  version_template: "{{ incpatch .Version }}-next"
