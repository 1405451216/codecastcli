name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ['1.22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test ./... -v -count=1 -timeout=5m

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        target:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
        run: |
          BINARY=codecast
          if [ "$GOOS" = "windows" ]; then
            BINARY=codecast.exe
          fi
          go build -ldflags="-s -w" -o dist/${BINARY}-${GOOS}-${GOARCH} .
      - uses: actions/upload-artifact@v4
        with:
          name: codecast-${{ matrix.target.goos }}-${{ matrix.target.goarch }}
          path: dist/codecast-*

  prompt-compat:
    name: Prompt Variant Compatibility
    runs-on: ${{ matrix.os }}
    needs: [test]
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Download dependencies
        run: go mod download
      # 矩阵测试：3 变体 × 5 上下文 = 15 个组合，全部必须渲染成功且无 {{var}} 残留
      - name: Run prompt variant compatibility tests
        run: go test -v -count=1 -run "TestAllVariants|TestVariant|TestRoundRobin|TestOnSelect" ./internal/promptab/
      # 验证 .codecast/commands/*.md 模板能正确解析和渲染
      - name: Run slash command loader tests
        run: go test -v -count=1 -run "TestLoadDir|TestRenderReal" ./internal/commands/
      # 验证 snapshot 测试（防止 prompt 字符串无意识漂移）
      - name: Run prompt snapshot tests
        run: go test -v -count=1 -run "TestBuildSystemPromptSnapshots" ./internal/agent/
      # 验证 CLI flag / config / env var 闭环
      - name: Verify CLI flags registered
        run: |
          go build -o /tmp/codecast .
          /tmp/codecast --help 2>&1 | grep -E "prompt-(variant|strategy|weight|project-dir)" || (echo "FAIL: prompt flags missing"; exit 1)
